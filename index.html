<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROYAL KENO CASINO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 ক্যাসিনো হেডার প্যানেল -->
    <div class="header">
        <div class="brand">
            <div class="name">ROYAL KENO</div>
            <div class="game">NEON BINGO JACKPOT</div>
        </div>
        <div class="header-right">
            <button class="sound-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
            <div class="balance-box">৳ <span id="user-balance">0.00</span></div>
        </div>
    </div>

    <!-- 🔮 [১ থেকে ৪০টি নাম্বারের রাজকীয় নিয়ন বিঙ্গো গ্রিড জোন] -->
    <div class="keno-board-outer">
        <div class="keno-grid" id="keno-grid-board">
            <!-- জাভাস্ক্রিপ্ট দিয়ে ১ থেকে ৪০টি ঘর ডায়নামিক রেন্ডার হবে ভাই ভাই -->
        </div>
    </div>

    <!-- 🏆 ইন-লাইন লাইভ স্কোরিং মেসেজ বার -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">১ থেকে ৫টি লাকি নাম্বার টাচ করে BET বোতাম চাপুন ভাই!</span>
    </div>

    <!-- 🎛️ কন্ট্রোল প্যানেল এরিয়া (৳১-৳২০০০ প্লাস-মাইনাস ও BET বোতাম পাশাপাশি লক ভাই) -->
    <div class="footer-controls">
        <div class="play-section">
            <div class="bet-selector">
                <button class="bet-btn-nav" onclick="adjustBet('minus')">−</button>
                <div style="text-align: center; width: 60px;">
                    <div style="font-size: 9px; color: #aaa; font-weight: bold;">BET</div>
                    <div style="font-size: 15px; font-weight: 900; color: #fff;" id="bet-display">৳৫০</div>
                </div>
                <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>
            </div>

            <button class="play-btn" id="spin-btn" onclick="handleKenoDraw()">BET</button>

            <div class="icon-group">
                <button class="icon-btn" id="auto-btn" onclick="toggleAuto()">🔄</button>
            </div>
        </div>
    </div>

    <!-- 🔌 [উইনগো কালার ট্রেড সিঙ্ক - ইউনিভার্সাল সকেট ইঞ্জিন লাইব্রেরি ভাই] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";
        
        const SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 50; 
        let selectedNumbers = []; // প্লেয়ারের চুজ করা নাম্বারের মেমরি ভাই ভাই
        let isSpinning = false; 
        let isAuto = false;
        let isMuted = false;
        let autoInterval = null;

        // ১ থেকে ৪০টি নিয়ন গ্রিড ঘর মোবাইল ভিউতে ডায়নামিক তৈরির লুপ ভাই ভাই
        function initKenoBoard() {
            const gridContainer = document.getElementById("keno-grid-board");
            gridContainer.innerHTML = "";
            
            for (let i = 1; i <= 40; i++) {
                const numBox = document.createElement("div");
                numBox.className = "keno-number-cell";
                numBox.innerText = i;
                numBox.id = `cell-${i}`;
                
                // ওয়ান-ক্লিক নাম্বার সিলেকশন হ্যান্ডলার ভাই ভাই
                numBox.onclick = () => handleNumberSelect(i);
                gridContainer.appendChild(numBox);
            }
        }

        function handleNumberSelect(num) {
            if (isSpinning) return;
            
            const cell = document.getElementById(`cell-${num}`);
            
            if (selectedNumbers.includes(num)) {
                // নাম্বার আন-সিলেক্ট লক ভাই ভাই
                selectedNumbers = selectedNumbers.filter(n => n !== num);
                cell.classList.remove("selected-neon");
                playAudio('click');
            } else {
                // সর্বোচ্চ ৫টি নাম্বার সিলেক্ট করার কড়া ইন্টারন্যাশনাল ক্যাসিনো বর্ম ভাই ভাই
                if (selectedNumbers.length >= 5) {
                    alert("🚨 সর্বোচ্চ ৫টি লাকি নাম্বার চুজ করতে পারবেন ভাই ভাই!");
                    return;
                }
                selectedNumbers.push(num);
                cell.classList.add("selected-neon");
                playAudio('click');
            }
            
            // স্ক্রিনের মেসেজ বারে রিয়েল-টাইমে আপডেট ভাই
            if (selectedNumbers.length > 0) {
                document.getElementById("win-text-msg").innerText = `🎯 চুজ করা লাকি নাম্বার: [${selectedNumbers.sort((a,b)=>a-b).join(", ")}]`;
            } else {
                document.getElementById("win-text-msg").innerText = "১ থেকে ৫টি লাকি নাম্বার টাচ করে BET বোতাম চাপুন ভাই!";
            }
        }

        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on("balanceUpdate", (data) => {
                if (data && data.username === urlUserId) {
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    fetchLiveBalance();
                }
            });
        }

        async function fetchLiveBalance() {
            try {
                const response = await fetch(`${SERVER_URL}/api/keno-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await response.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                }
            } catch (e) { console.error("Balance lag"); }
        }

        window.onload = () => {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
            initKenoBoard();
        };

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 1) {
                if (currentBet <= 10) currentBet -= 1;
                else if (currentBet <= 100) currentBet -= 10;
                else currentBet -= 50;
            }
            if (action === 'plus' && currentBet < 2000) {
                if (currentBet < 10) currentBet += 1;
                else if (currentBet < 100) currentBet += 10;
                else currentBet += 50;
            }
            if (currentBet < 1) currentBet = 1;
            if (currentBet > 2000) currentBet = 2000;
            
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            playAudio('click');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🔊";
            document.getElementById("mute-btn").classList.toggle("muted-active", isMuted);
        }

                function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById("auto-btn").classList.toggle("active", isAuto);
            if (isAuto && !isSpinning) handleKenoDraw();
            playAudio('click');
        }

        async function handleKenoDraw() {
            if (isSpinning) return;
            if (selectedNumbers.length === 0) {
                alert("🚨 আগে বোর্ড থেকে অন্তত ১টি বা সর্বোচ্চ ৫টি লাকি নাম্বার টাচ করে চুজ করুন ভাই!");
                isAuto = false;
                document.getElementById("auto-btn").classList.remove("active");
                return;
            }

            const msgBox = document.getElementById("win-status-box");
            msgBox.className = "win-status-container";
            document.getElementById("win-text-msg").innerText = "🔮 ক্যাসিনো বল মেশিন থেকে বিজয়ী নাম্বার বের হচ্ছে...";

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;

            // ১ থেকে ৪০টি ঘরের ওল্ড উইন-ব্লাস্ট কালারগুলো রিসেট লক ভাই ভাই
            for (let i = 1; i <= 40; i++) {
                const cell = document.getElementById(`cell-${i}`);
                if (cell) {
                    cell.classList.remove("hit-win-neon", "miss-neon");
                }
            }

            try {
                const response = await fetch(`${SERVER_URL}/api/keno-draw`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: urlUserId,
                        amount: parseFloat(currentBet),
                        wallet: urlWallet,
                        numbers: selectedNumbers
                    })
                });

                const data = await response.json();

                if (data && data.success === true) {
                    balance = parseFloat(data.balance);
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");

                    // 🎯 [ক্যাসিনো লটারি বল ড্রপিং লুপ]: ৫টি বিজয়ী নাম্বার একে একে চোখের সামনে লাইভ ফ্ল্যাশ হবে ভাই ভাই!
                    const serverWinningBalls = data.winningNumbers; // ৫টি নাম্বারের অ্যারে ভাই ভাই
                    let ballIdx = 0;

                    const ballDropInterval = setInterval(() => {
                        if (ballIdx < serverWinningBalls.length) {
                            const luckyNum = serverWinningBalls[ballIdx];
                            const cell = document.getElementById(`cell-${luckyNum}`);
                            
                            if (cell) {
                                // 🚀 বল ড্রপ হওয়ার সাথে সাথে spin2.mp3 খটখট কড়া আওয়াজ আসবে ভাই ভাই
                                playAudio('spin');
                                
                                if (selectedNumbers.includes(luckyNum)) {
                                    // প্লেয়ারের নাম্বারের সাথে হুবহু ম্যাচ হলে সবুজ উইন ব্লাস্ট গ্লো ভাই ভাই!
                                    cell.classList.add("hit-win-neon");
                                    playAudio('click'); // খুট করে একটি বাড়তি সাকসেস বিট ভাই
                                } else {
                                    // মিস হলে লাল গ্লো ভাই ভাই
                                    cell.classList.add("miss-neon");
                                }
                            }
                            ballIdx++;
                        } else {
                            // ৫টি বল ড্রপ শেষ হলে লুপ ক্লিয়ার ভাই ভাই
                            clearInterval(ballDropInterval);
                            showFinalResult(data.status, data.winAmount, data.matchCount);
                        }
                    }, 600); // প্রতি ০.৬ সেকেন্ডে ১টি করে সোনার বল লাইভ ড্রপ খাবে ভাই!

                } else {
                    alert(data.message || "❌ Insufficient Balance! Please Recharge.");
                    stopKenoState();
                }
            } catch (err) {
                alert("⚠️ সেশনアウト! আবার BET বোতাম চাপুন ভাই ভাই।");
                stopKenoState();
            }
        }

        function showFinalResult(status, winAmount, matchCount) {
            const msgBox = document.getElementById("win-status-box");
            const textMsg = document.getElementById("win-text-msg");

            if (status === "win") {
                if (matchCount >= 3) {
                    playAudio('bigwin'); // 🚀 ৩ বা তার বেশি নাম্বার ম্যাচ করে মেগা জ্যাকপট হিট হলে bigwin1.mp3 ভাই ভাই
                } else {
                    playAudio('win'); // 🚀 সাধারণ ১ বা ২ ঘর ম্যাচ প্রফিট উইন হলে win2.mp3 ভাই ভাই
                }
                msgBox.className = "win-status-container win-glow-bar";
                textMsg.innerText = `🏆 মেগা উইন!! ওরিজিনাল [${matchCount}] টি নাম্বার হুবহু মিলে গেছে! (৳${winAmount})`;
            } else {
                playAudio('wheel'); // 🚀 কোনো নাম্বার অমিল বা লস হলে wheel1.mp3 ব্যাকআপ সাউন্ড ফায়ার লক!
                msgBox.className = "win-status-container lose-glow-bar";
                textMsg.innerText = `❌ এই রাউন্ডে কোনো নাম্বার ম্যাচ হয়নি ভাই। আবার ট্রাই করুন ভাই ভাই!`;
            }

            document.getElementById("user-balance").innerText = balance.toFixed(2);
            stopKenoState();

            if (isAuto) {
                autoInterval = setTimeout(() => {
                    if (isAuto) handleKenoDraw();
                }, 2000);
            }
        }

        function stopKenoState() {
            isSpinning = false;
            document.getElementById("spin-btn").disabled = false;
            if (!isAuto && autoInterval) clearTimeout(autoInterval);
        }

        // 🎯 [৫টি প্রিমিয়াম সাউন্ড ও বাফার গেটওয়ে লক ভাই ভাই]
        const slotSounds = {
            click: new Audio('click2.mp3'),   // 🚀 বাটন এবং নাম্বার সিলেকশন ক্লিক
            spin: new Audio('spin2.mp3'),     // 🚀 ক্যাসিনো লটারি বল ড্রপ খটখট আওয়াজ ভাই
            win: new Audio('win2.mp3'),       // 🚀 নরমাল লাইন প্রফিট উইন
            bigwin: new Audio('bigwin1.mp3'), // 🚀 ৩-৫ নাম্বার ম্যাচিং মেগা জ্যাকপট ব্লাস্ট
            wheel: new Audio('wheel1.mp3')    // 🚀 জিরো ম্যাচ বা লস ব্যাকআপ সাউন্ড
        };
        Object.values(slotSounds).forEach(s => s.load());

        function playAudio(type) { 
            if (isMuted) return; // 🔇 সাউন্ড অফ থাকলে কোনো অডিও প্লে হবে না ভাই ভাই!
            try { 
                slotSounds[type].currentTime = 0; 
                slotSounds[type].play(); 
            } catch(e){} 
        }
    </script>
</body>
</html>
